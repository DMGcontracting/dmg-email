<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMG Email Sender</title>
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.27.0/lib/msal-browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0f1a2e; color: #e2e8f0; font-family: 'Arial Narrow', Arial, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .container { width: 100%; max-width: 560px; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-box { width: 42px; height: 42px; background: #e8b84b; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; color: #0f1a2e; }
  .logo-text h1 { font-size: 18px; font-weight: 700; color: #e2e8f0; }
  .logo-text p { font-size: 11px; color: #4a5568; }
  .badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; }
  .badge.signed-in { background: #27ae6022; color: #27ae60; border: 1px solid #27ae6044; }
  .badge.signed-out { background: #a9322622; color: #a93226; border: 1px solid #a9322644; }
  .card { background: #142236; border: 1px solid #2e4066; border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .card-label { font-size: 9px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #4a5568; margin-bottom: 12px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 10px; color: #4a5568; margin-bottom: 4px; }
  .field input, .field textarea { width: 100%; background: #0f1a2e; border: 1px solid #2e4066; border-radius: 6px; padding: 9px 12px; color: #e2e8f0; font-size: 12px; font-family: inherit; outline: none; transition: border-color .2s; }
  .field input:focus, .field textarea:focus { border-color: #e8b84b44; }
  .field textarea { resize: vertical; min-height: 120px; }
  .field input[readonly] { color: #4a5568; cursor: default; }
  .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .toggle { width: 34px; height: 18px; background: #2e4066; border-radius: 9px; position: relative; cursor: pointer; border: none; transition: background .2s; }
  .toggle.on { background: #e8b84b; }
  .toggle::after { content: ''; position: absolute; top: 2px; left: 2px; width: 14px; height: 14px; background: #0f1a2e; border-radius: 50%; transition: left .2s; }
  .toggle.on::after { left: 18px; }
  .toggle-label { font-size: 11px; color: #4a5568; }
  .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; transition: opacity .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-primary { background: #e8b84b; color: #0f1a2e; }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
  .btn-sign-in { background: #e8b84b22; color: #e8b84b; border: 1px solid #e8b84b44; }
  .btn-sign-out { background: #a9322622; color: #a93226; border: 1px solid #a9322644; font-size: 11px; padding: 5px 12px; width: auto; border-radius: 20px; }
  .status { margin-top: 12px; text-align: center; font-size: 12px; font-weight: 600; min-height: 18px; }
  .status.success { color: #27ae60; }
  .status.error { color: #a93226; }
  .status.info { color: #5b9cf6; }
  .compose-wrapper { opacity: .4; pointer-events: none; transition: opacity .3s; }
  .compose-wrapper.active { opacity: 1; pointer-events: all; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-box">DMG</div>
      <div class="logo-text">
        <h1>Email Sender</h1>
        <p>Microsoft Graph</p>
      </div>
    </div>
    <div id="authBadge" class="badge signed-out">● Not signed in</div>
  </div>

  <div class="card">
    <div class="card-label">Azure App Registration</div>
    <div class="field-row">
      <div class="field">
        <label>Tenant ID</label>
        <input type="text" id="tenantId" value="e8920695-bc3c-43df-acf2-8d101b8adb63" readonly>
      </div>
      <div class="field">
        <label>Client ID</label>
        <input type="text" id="clientId" value="30273390-649b-426d-bb06-e8ceba358bd6" readonly>
      </div>
    </div>
    <div id="authStatus" class="status info">Click "Sign in" to authenticate</div>
    <br>
    <button id="signInBtn" class="btn btn-sign-in" onclick="signIn()">🔐 Sign in with Microsoft</button>
  </div>

  <div id="composeWrapper" class="compose-wrapper card">
    <div class="card-label">Compose</div>
    <div class="field">
      <label>To</label>
      <input type="email" id="toField" placeholder="recipient@example.com">
    </div>
    <div class="field-row">
      <div class="field">
        <label>CC (optional)</label>
        <input type="email" id="ccField" placeholder="cc@example.com">
      </div>
      <div class="field">
        <label>BCC (optional)</label>
        <input type="email" id="bccField" placeholder="bcc@example.com">
      </div>
    </div>
    <div class="field">
      <label>Subject</label>
      <input type="text" id="subjectField" placeholder="Subject line">
    </div>
    <div class="field">
      <label>Body</label>
      <textarea id="bodyField" placeholder="Message body..."></textarea>
    </div>
    <div class="toggle-row">
      <button class="toggle" id="htmlToggle" onclick="toggleHtml()"></button>
      <span class="toggle-label">Send as HTML</span>
    </div>
  </div>

  <button id="sendBtn" class="btn btn-primary" onclick="sendEmail()" disabled>✈ Send Email</button>
  <div id="sendStatus" class="status"></div>
</div>

<script>
  let msalInstance = null;
  let account = null;
  let isHtml = false;

  const TENANT_ID = document.getElementById('tenantId').value;
  const CLIENT_ID = document.getElementById('clientId').value;
  const REDIRECT_URI = 'https://dmgcontracting.github.io/dmg-email/';

  const msalConfig = {
    auth: {
      clientId: CLIENT_ID,
      authority: 'https://login.microsoftonline.com/' + TENANT_ID,
      redirectUri: REDIRECT_URI,
      navigateToLoginRequestUrl: true,
    },
    cache: {
      cacheLocation: 'sessionStorage',
      storeAuthStateInCookie: true,
    }
  };

  const loginRequest = {
    scopes: ['https://graph.microsoft.com/Mail.Send', 'https://graph.microsoft.com/User.Read']
  };

  async function initMsal() {
    msalInstance = new msal.PublicClientApplication(msalConfig);
    await msalInstance.initialize();

    // Handle redirect response after login
    try {
      const response = await msalInstance.handleRedirectPromise();
      if (response && response.account) {
        account = response.account;
        setSignedIn(account.username);
        return;
      }
    } catch (e) {
      console.error('Redirect error:', e);
    }

    // Check for existing account
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      account = accounts[0];
      setSignedIn(account.username);
    }
  }

  function setSignedIn(username) {
    document.getElementById('authBadge').className = 'badge signed-in';
    document.getElementById('authBadge').textContent = '● ' + username;
    document.getElementById('authStatus').className = 'status success';
    document.getElementById('authStatus').textContent = 'Authenticated successfully';
    document.getElementById('signInBtn').textContent = '🔓 Sign out';
    document.getElementById('signInBtn').className = 'btn btn-sign-out';
    document.getElementById('signInBtn').onclick = signOut;
    document.getElementById('composeWrapper').classList.add('active');
    document.getElementById('sendBtn').disabled = false;
  }

  function signIn() {
    if (!msalInstance) return;
    // Use redirect — no popup issues
    msalInstance.loginRedirect(loginRequest);
  }

  function signOut() {
    if (!msalInstance || !account) return;
    msalInstance.logoutRedirect({ account });
  }

  function toggleHtml() {
    isHtml = !isHtml;
    const btn = document.getElementById('htmlToggle');
    btn.classList.toggle('on', isHtml);
  }

  async function getToken() {
    const silentRequest = { ...loginRequest, account };
    try {
      const response = await msalInstance.acquireTokenSilent(silentRequest);
      return response.accessToken;
    } catch (e) {
      // Silent failed — redirect for new token
      msalInstance.acquireTokenRedirect(silentRequest);
      return null;
    }
  }

  async function sendEmail() {
    const to = document.getElementById('toField').value.trim();
    const cc = document.getElementById('ccField').value.trim();
    const bcc = document.getElementById('bccField').value.trim();
    const subject = document.getElementById('subjectField').value.trim();
    const body = document.getElementById('bodyField').value.trim();
    const statusEl = document.getElementById('sendStatus');

    if (!to) { statusEl.className = 'status error'; statusEl.textContent = 'Please enter a recipient.'; return; }
    if (!subject) { statusEl.className = 'status error'; statusEl.textContent = 'Please enter a subject.'; return; }
    if (!body) { statusEl.className = 'status error'; statusEl.textContent = 'Please enter a message body.'; return; }

    statusEl.className = 'status info';
    statusEl.textContent = 'Sending…';
    document.getElementById('sendBtn').disabled = true;

    const token = await getToken();
    if (!token) return;

    const message = {
      subject,
      body: { contentType: isHtml ? 'HTML' : 'Text', content: body },
      toRecipients: [{ emailAddress: { address: to } }]
    };
    if (cc) message.ccRecipients = [{ emailAddress: { address: cc } }];
    if (bcc) message.bccRecipients = [{ emailAddress: { address: bcc } }];

    try {
      const res = await fetch('https://graph.microsoft.com/v1.0/me/sendMail', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message, saveToSentItems: true })
      });

      if (res.status === 202) {
        statusEl.className = 'status success';
        statusEl.textContent = '✅ Email sent successfully!';
        document.getElementById('toField').value = '';
        document.getElementById('subjectField').value = '';
        document.getElementById('bodyField').value = '';
      } else {
        const err = await res.json();
        statusEl.className = 'status error';
        statusEl.textContent = '❌ Error: ' + (err.error?.message || res.status);
      }
    } catch (e) {
      statusEl.className = 'status error';
      statusEl.textContent = '❌ Network error: ' + e.message;
    }

    document.getElementById('sendBtn').disabled = false;
  }

  // Init on load
  initMsal();
</script>
</body>
</html>
